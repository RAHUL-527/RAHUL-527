name: Update Latest Repository

on:
  schedule:
    - cron: "0 */6 * * *" # every 6 hours
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-readme:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y jq

      - name: Get latest repository info
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          USERNAME: rahul-527   # <--- your username
        run: |
          echo "Fetching latest repository..."
          
          LATEST_REPO_JSON=$(curl -s -H "Authorization: Bearer $GH_TOKEN" \
            "https://api.github.com/users/$USERNAME/repos?sort=updated&per_page=1")

          REPO_NAME=$(echo "$LATEST_REPO_JSON" | jq -r '.[0].name')
          REPO_DESC=$(echo "$LATEST_REPO_JSON" | jq -r '.[0].description // "No description available"')
          REPO_URL="https://github.com/$USERNAME/$REPO_NAME"

          echo "Latest repo: $REPO_NAME"

          # Safely encode content for README
          README_CONTENT="### 🚀 [$REPO_NAME]($REPO_URL)\n\n$REPO_DESC"

          # Replace content between markers
          # Using perl for safer multi-line replacement
          perl -0777 -i -pe 's/<!-- LATEST_REPO_START -->.*?<!-- LATEST_REPO_END -->/<!-- LATEST_REPO_START -->\n'"$README_CONTENT"'\n<!-- LATEST_REPO_END -->/gs' README.md

      - name: Commit and push changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add README.md
          git diff --staged --quiet || git commit -m "Update latest repository"
          git push
