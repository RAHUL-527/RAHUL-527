name: Update Latest Repositories Pro

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-readme:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y jq curl

      - name: Fetch latest 5 non-fork repositories
        env:
          USERNAME: rahul-527
        run: |
          curl -s "https://api.github.com/users/$USERNAME/repos?per_page=100&sort=updated" \
          | jq -r '[.[] | select(.fork==false)] | .[:5] | .[] |
          "\(.name)|\(.description // "No description available")|\(.language // "N/A")|\(.stargazers_count)|\(.forks_count)|\(.html_url)"' \
          > repos.txt

      - name: Build README block
        run: |
          rm -f block.md
          touch block.md

          while IFS="|" read -r NAME DESC LANG STARS FORKS URL
          do
            echo "### [$NAME]($URL)" >> block.md
            echo "" >> block.md
            echo "$DESC" >> block.md
            echo "" >> block.md
            echo "![Language](https://img.shields.io/badge/language-$LANG-blue?style=for-the-badge) ![Stars](https://img.shields.io/github/stars/rahul-527/$NAME?style=for-the-badge) ![Forks](https://img.shields.io/github/forks/rahul-527/$NAME?style=for-the-badge)" >> block.md
            echo "" >> block.md
            echo "---" >> block.md
            echo "" >> block.md
          done < repos.txt

      - name: Inject block into README
        run: |
          awk '
          BEGIN {inside=1}
          /<!-- LATEST_REPO_START -->/ {
            print;
            system("cat block.md");
            inside=0;
            next
          }
          /<!-- LATEST_REPO_END -->/ {
            inside=1
          }
          inside
          ' README.md > README.tmp

          mv README.tmp README.md

      - name: Commit and push changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add README.md
          git diff --staged --quiet || git commit -m "Update top 5 latest repositories"
          git push
