name: Update Latest Repository

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-readme:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install jq
        run: |
          sudo apt-get update
          sudo apt-get install -y jq

      - name: Fetch latest repo
        env:
          USERNAME: rahul-527
        run: |
          RESPONSE=$(curl -s "https://api.github.com/users/$USERNAME/repos?sort=updated&per_page=1")

          REPO_NAME=$(echo "$RESPONSE" | jq -r '.[0].name')
          REPO_DESC=$(echo "$RESPONSE" | jq -r '.[0].description // "No description available"')
          REPO_URL="https://github.com/$USERNAME/$REPO_NAME"

          echo "REPO_NAME=$REPO_NAME" >> $GITHUB_ENV
          echo "REPO_DESC=$REPO_DESC" >> $GITHUB_ENV
          echo "REPO_URL=$REPO_URL" >> $GITHUB_ENV

      - name: Update README
        run: |
          cat README.md | awk -v name="$REPO_NAME" -v desc="$REPO_DESC" -v url="$REPO_URL" '
          BEGIN {inside=1}
          /<!-- LATEST_REPO_START -->/ {
            print;
            print "### 🚀 [" name "](" url ")";
            print "";
            print desc;
            inside=0;
            next
          }
          /<!-- LATEST_REPO_END -->/ {
            inside=1
          }
          inside
          ' > README.tmp

          mv README.tmp README.md

      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add README.md
          git diff --staged --quiet || git commit -m "Update latest repository"
          git push
