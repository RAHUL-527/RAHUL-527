name: Update Latest Repository Pro

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-readme:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y jq curl

      - name: Fetch latest non-fork repo info
        env:
          USERNAME: rahul-527
        run: |
          # Get latest non-fork repo
          RESPONSE=$(curl -s "https://api.github.com/users/$USERNAME/repos?sort=updated&per_page=100")
          LATEST_REPO=$(echo "$RESPONSE" | jq -r '[.[] | select(.fork==false)][0]')

          REPO_NAME=$(echo "$LATEST_REPO" | jq -r '.name')
          REPO_DESC=$(echo "$LATEST_REPO" | jq -r '.description // "No description available"')
          REPO_URL="https://github.com/$USERNAME/$REPO_NAME"
          REPO_LANG=$(echo "$LATEST_REPO" | jq -r '.language // "N/A"')
          REPO_STARS=$(echo "$LATEST_REPO" | jq -r '.stargazers_count')
          REPO_FORKS=$(echo "$LATEST_REPO" | jq -r '.forks_count')

          echo "REPO_NAME=$REPO_NAME" >> $GITHUB_ENV
          echo "REPO_DESC=$REPO_DESC" >> $GITHUB_ENV
          echo "REPO_URL=$REPO_URL" >> $GITHUB_ENV
          echo "REPO_LANG=$REPO_LANG" >> $GITHUB_ENV
          echo "REPO_STARS=$REPO_STARS" >> $GITHUB_ENV
          echo "REPO_FORKS=$REPO_FORKS" >> $GITHUB_ENV

      - name: Update README with badges
        run: |
          BADGES="![Language](https://img.shields.io/badge/language-$REPO_LANG-blue?style=for-the-badge&logo=github) ![Stars](https://img.shields.io/github/stars/$USERNAME/$REPO_NAME?style=for-the-badge) ![Forks](https://img.shields.io/github/forks/$USERNAME/$REPO_NAME?style=for-the-badge)"
          
          # Replace content between markers
          awk -v name="$REPO_NAME" -v desc="$REPO_DESC" -v url="$REPO_URL" -v badges="$BADGES" '
          BEGIN {inside=1}
          /<!-- LATEST_REPO_START -->/ {
            print;
            print "### 🚀 [" name "](" url ")";
            print "";
            print desc;
            print "";
            print badges;
            inside=0;
            next
          }
          /<!-- LATEST_REPO_END -->/ {
            inside=1
          }
          inside
          ' README.md > README.tmp

          mv README.tmp README.md

      - name: Commit and push changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add README.md
          git diff --staged --quiet || git commit -m "Update latest repo with badges"
          git push
