name: Update Latest Repository

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-readme:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install jq
        run: sudo apt-get update && sudo apt-get install -y jq

      - name: Update latest repository
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          USERNAME: RAHUL-527   # <-- Replace with your GitHub username
        run: |
          # Get the latest updated repo
          REPO=$(curl -s \
            -H "Authorization: Bearer $GH_TOKEN" \
            "https://api.github.com/users/$USERNAME/repos?sort=updated&per_page=1" \
            | jq -r '.[0].name')

          DESC=$(curl -s \
            -H "Authorization: Bearer $GH_TOKEN" \
            "https://api.github.com/repos/$USERNAME/$REPO" \
            | jq -r '.description // "No description available"')

          CONTENT="### 🚀 [$REPO](https://github.com/$USERNAME/$REPO)\n\n$DESC"

          # Replace content in README.md
          sed -i '/<!-- LATEST_REPO_START -->/,/<!-- LATEST_REPO_END -->/c\
<!-- LATEST_REPO_START -->\
'"$CONTENT"'\
<!-- LATEST_REPO_END -->' README.md

      - name: Commit and push changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add README.md
          git diff --staged --quiet || git commit -m "Update latest repository"
          git push
